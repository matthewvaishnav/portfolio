<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="28" fill="#17191D"/>
  <rect x="60" y="72" width="1080" height="576" rx="24" fill="#1D2026" stroke="#2E3540"/>
  <text x="94" y="132" fill="#F6F7FB" font-family="Arial, sans-serif" font-size="42" font-weight="700">snapshot flow</text>
  <rect x="108" y="198" width="240" height="220" rx="20" fill="#111419" stroke="#303744"/>
  <rect x="480" y="198" width="240" height="220" rx="20" fill="#111419" stroke="#303744"/>
  <rect x="852" y="198" width="240" height="220" rx="20" fill="#111419" stroke="#303744"/>
  <text x="162" y="258" fill="#8FB8FF" font-family="Arial, sans-serif" font-size="30" font-weight="700">1. capture</text>
  <text x="126" y="300" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">Collect packages,</text>
  <text x="126" y="324" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">services, ports,</text>
  <text x="126" y="348" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">files, and config.</text>
  <text x="534" y="258" fill="#7FE7D7" font-family="Arial, sans-serif" font-size="30" font-weight="700">2. compare</text>
  <text x="498" y="300" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">Diff snapshot A</text>
  <text x="498" y="324" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">against B. Only</text>
  <text x="498" y="348" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">surface meaningful</text>
  <text x="498" y="372" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">change.</text>
  <text x="906" y="258" fill="#FFC977" font-family="Arial, sans-serif" font-size="30" font-weight="700">3. act</text>
  <text x="870" y="300" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">Explain risk,</text>
  <text x="870" y="324" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">restore known</text>
  <text x="870" y="348" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">good state, keep</text>
  <text x="870" y="372" fill="#DCE6FF" font-family="Arial, sans-serif" font-size="18">history.</text>
  <path d="M348 308H480" stroke="#4B5565" stroke-width="6"/>
  <path d="M720 308H852" stroke="#4B5565" stroke-width="6"/>
  <rect x="108" y="470" width="984" height="112" rx="18" fill="#101318" stroke="#333B47"/>
  <text x="144" y="516" fill="#F6F7FB" font-family="Arial, sans-serif" font-size="28" font-weight="700">why it feels like git</text>
  <text x="144" y="540" fill="#A7B4C8" font-family="Arial, sans-serif" font-size="18">Snapshots behave like commits. Diffs explain change.</text>
  <text x="144" y="566" fill="#A7B4C8" font-family="Arial, sans-serif" font-size="18">History makes rollback and debugging sane.</text>
</svg>
