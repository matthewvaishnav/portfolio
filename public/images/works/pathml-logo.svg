<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradPath1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradPath2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="#0a0a0a" stroke="url(#gradPath1)" stroke-width="3"/>
  
  <!-- Grid pattern (representing WSI tiles) -->
  <g opacity="0.2" stroke="url(#gradPath1)" stroke-width="1" fill="none">
    <rect x="80" y="80" width="60" height="60"/>
    <rect x="140" y="80" width="60" height="60"/>
    <rect x="200" y="80" width="60" height="60"/>
    <rect x="260" y="80" width="60" height="60"/>
    <rect x="80" y="140" width="60" height="60"/>
    <rect x="140" y="140" width="60" height="60"/>
    <rect x="200" y="140" width="60" height="60"/>
    <rect x="260" y="140" width="60" height="60"/>
    <rect x="80" y="200" width="60" height="60"/>
    <rect x="140" y="200" width="60" height="60"/>
    <rect x="200" y="200" width="60" height="60"/>
    <rect x="260" y="200" width="60" height="60"/>
    <rect x="80" y="260" width="60" height="60"/>
    <rect x="140" y="260" width="60" height="60"/>
    <rect x="200" y="260" width="60" height="60"/>
    <rect x="260" y="260" width="60" height="60"/>
  </g>
  
  <!-- Neural network nodes -->
  <circle cx="120" cy="120" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="200" cy="100" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="280" cy="120" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="150" cy="200" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="250" cy="200" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="120" cy="280" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="200" cy="300" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  <circle cx="280" cy="280" r="12" fill="url(#gradPath2)" opacity="0.8"/>
  
  <!-- Connecting lines (neural network) -->
  <line x1="120" y1="120" x2="200" y2="100" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="100" x2="280" y2="120" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="120" x2="150" y2="200" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="120" x2="250" y2="200" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="150" y1="200" x2="120" y2="280" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="150" y1="200" x2="200" y2="300" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="200" x2="200" y2="300" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="200" x2="280" y2="280" stroke="url(#gradPath1)" stroke-width="2" opacity="0.4"/>
  
  <!-- Center attention mechanism -->
  <circle cx="200" cy="200" r="40" fill="none" stroke="url(#gradPath2)" stroke-width="3" opacity="0.6"/>
  <circle cx="200" cy="200" r="25" fill="none" stroke="url(#gradPath2)" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="200" r="10" fill="url(#gradPath1)"/>
  
  <!-- DNA helix elements -->
  <path d="M 200 200 Q 220 180 240 200 Q 220 220 200 200" fill="none" stroke="url(#gradPath1)" stroke-width="2" opacity="0.5"/>
  <path d="M 200 200 Q 180 180 160 200 Q 180 220 200 200" fill="none" stroke="url(#gradPath1)" stroke-width="2" opacity="0.5"/>
</svg>
