<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightRedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#redGradient)" stroke="#7f1d1d" stroke-width="2"/>
  
  <!-- Microscope lens/cell structure -->
  <circle cx="100" cy="80" r="35" fill="none" stroke="#fecaca" stroke-width="3" opacity="0.8"/>
  <circle cx="100" cy="80" r="25" fill="none" stroke="#fca5a5" stroke-width="2" opacity="0.9"/>
  <circle cx="100" cy="80" r="15" fill="url(#lightRedGradient)" opacity="0.7"/>
  
  <!-- DNA helix/data structure -->
  <path d="M 70 120 Q 85 110 100 120 Q 115 130 130 120" stroke="#fecaca" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 70 130 Q 85 140 100 130 Q 115 120 130 130" stroke="#fca5a5" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Data points/cells -->
  <circle cx="75" cy="125" r="3" fill="#fecaca"/>
  <circle cx="90" cy="115" r="3" fill="#fca5a5"/>
  <circle cx="110" cy="125" r="3" fill="#fecaca"/>
  <circle cx="125" cy="115" r="3" fill="#fca5a5"/>
  
  <!-- Neural network nodes -->
  <circle cx="60" cy="160" r="4" fill="#fca5a5" opacity="0.9"/>
  <circle cx="85" cy="155" r="4" fill="#fecaca" opacity="0.9"/>
  <circle cx="115" cy="155" r="4" fill="#fca5a5" opacity="0.9"/>
  <circle cx="140" cy="160" r="4" fill="#fecaca" opacity="0.9"/>
  
  <!-- Connections -->
  <line x1="60" y1="160" x2="85" y2="155" stroke="#fca5a5" stroke-width="1.5" opacity="0.6"/>
  <line x1="85" y1="155" x2="115" y2="155" stroke="#fecaca" stroke-width="1.5" opacity="0.6"/>
  <line x1="115" y1="155" x2="140" y2="160" stroke="#fca5a5" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Core text -->
  <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fecaca">HISTO</text>
  <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fecaca">CORE</text>
</svg>