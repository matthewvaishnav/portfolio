<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradSent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7928ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradSent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" rx="20" fill="#0a0a0a" stroke="url(#gradSent1)" stroke-width="3"/>
  
  <!-- Hexagon network -->
  <polygon points="300,80 380,140 380,260 300,320 220,260 220,140" 
           fill="none" stroke="url(#gradSent2)" stroke-width="4" opacity="0.6"/>
  
  <!-- Inner triangles -->
  <polygon points="300,130 340,200 300,270" fill="url(#gradSent1)" opacity="0.3"/>
  <polygon points="300,130 260,200 300,270" fill="url(#gradSent2)" opacity="0.3"/>
  
  <!-- Center diamond -->
  <polygon points="300,170 330,200 300,230 270,200" 
           fill="none" stroke="url(#gradSent1)" stroke-width="3"/>
  
  <!-- Connecting lines -->
  <line x1="300" y1="80" x2="300" y2="170" stroke="url(#gradSent2)" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="140" x2="330" y2="200" stroke="url(#gradSent2)" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="260" x2="330" y2="200" stroke="url(#gradSent2)" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="320" x2="300" y2="230" stroke="url(#gradSent2)" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="260" x2="270" y2="200" stroke="url(#gradSent2)" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="140" x2="270" y2="200" stroke="url(#gradSent2)" stroke-width="2" opacity="0.5"/>
  
  <!-- Center dot -->
  <circle cx="300" cy="200" r="8" fill="url(#gradSent1)"/>
  
  <!-- Corner nodes -->
  <circle cx="300" cy="80" r="6" fill="#00d4ff"/>
  <circle cx="380" cy="140" r="6" fill="#00d4ff"/>
  <circle cx="380" cy="260" r="6" fill="#00d4ff"/>
  <circle cx="300" cy="320" r="6" fill="#00d4ff"/>
  <circle cx="220" cy="260" r="6" fill="#00d4ff"/>
  <circle cx="220" cy="140" r="6" fill="#00d4ff"/>
</svg>
