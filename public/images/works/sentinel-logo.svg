<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7928ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#0a0a0a" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Outer hexagon -->
  <polygon points="200,50 320,125 320,275 200,350 80,275 80,125" 
           fill="none" stroke="url(#grad2)" stroke-width="4" opacity="0.6"/>
  
  <!-- Inner rotating triangles -->
  <polygon points="200,100 260,200 200,300" fill="url(#grad1)" opacity="0.3"/>
  <polygon points="200,100 140,200 200,300" fill="url(#grad2)" opacity="0.3"/>
  
  <!-- Center diamond -->
  <polygon points="200,150 250,200 200,250 150,200" 
           fill="none" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Connecting lines -->
  <line x1="200" y1="50" x2="200" y2="150" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="125" x2="250" y2="200" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="275" x2="250" y2="200" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="350" x2="200" y2="250" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="275" x2="150" y2="200" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="125" x2="150" y2="200" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  
  <!-- Center dot -->
  <circle cx="200" cy="200" r="8" fill="url(#grad1)"/>
  
  <!-- Corner nodes -->
  <circle cx="200" cy="50" r="6" fill="#00d4ff"/>
  <circle cx="320" cy="125" r="6" fill="#00d4ff"/>
  <circle cx="320" cy="275" r="6" fill="#00d4ff"/>
  <circle cx="200" cy="350" r="6" fill="#00d4ff"/>
  <circle cx="80" cy="275" r="6" fill="#00d4ff"/>
  <circle cx="80" cy="125" r="6" fill="#00d4ff"/>
</svg>
