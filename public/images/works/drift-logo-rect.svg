<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fae8ff"/>
  
  <!-- Complex git graph with merge -->
  <circle cx="255" cy="195" r="10" fill="#a855f7"/>
  <line x1="265" y1="195" x2="290" y2="195" stroke="#a855f7" stroke-width="4"/>
  <circle cx="300" cy="195" r="10" fill="#a855f7"/>
  
  <!-- Branch up -->
  <line x1="300" y1="185" x2="300" y2="160" stroke="#a855f7" stroke-width="4"/>
  <circle cx="300" cy="150" r="10" fill="#a855f7"/>
  <line x1="310" y1="150" x2="330" y2="150" stroke="#a855f7" stroke-width="4"/>
  <circle cx="340" cy="150" r="10" fill="#a855f7"/>
  
  <!-- Merge back -->
  <line x1="340" y1="160" x2="345" y2="185" stroke="#a855f7" stroke-width="4"/>
  
  <!-- Continue main -->
  <line x1="310" y1="195" x2="335" y2="195" stroke="#a855f7" stroke-width="4"/>
  <circle cx="345" cy="195" r="10" fill="#a855f7"/>
  
  <!-- Text centered -->
  <text x="300" y="270" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">drift</text>
</svg>
