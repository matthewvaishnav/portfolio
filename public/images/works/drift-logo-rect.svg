<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fae8ff"/>
  
  <!-- Git graph - commits + branch -->
  <circle cx="270" cy="195" r="10" fill="#a855f7"/>
  <line x1="280" y1="195" x2="305" y2="195" stroke="#a855f7" stroke-width="4"/>
  <circle cx="315" cy="195" r="10" fill="#a855f7"/>
  
  <!-- Branch up -->
  <line x1="315" y1="185" x2="315" y2="165" stroke="#a855f7" stroke-width="4"/>
  <circle cx="315" cy="155" r="10" fill="#a855f7"/>
  
  <!-- Continue main -->
  <line x1="325" y1="195" x2="350" y2="195" stroke="#a855f7" stroke-width="4"/>
  <circle cx="360" cy="195" r="10" fill="#a855f7"/>
  
  <!-- Text centered -->
  <text x="300" y="270" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">drift</text>
</svg>
