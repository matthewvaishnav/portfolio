<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fef3c7"/>
  
  <!-- Complex terminal window -->
  <rect x="250" y="145" width="100" height="80" fill="none" stroke="#f59e0b" stroke-width="4" rx="10"/>
  <rect x="255" y="150" width="90" height="70" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3" rx="8"/>
  
  <!-- Header bar -->
  <line x1="250" y1="170" x2="350" y2="170" stroke="#f59e0b" stroke-width="3"/>
  
  <!-- Terminal dots -->
  <circle cx="265" cy="158" r="3.5" fill="#f59e0b"/>
  <circle cx="278" cy="158" r="3.5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="291" cy="158" r="3.5" fill="#f59e0b" opacity="0.6"/>
  
  <!-- Warning X with glow -->
  <circle cx="300" cy="195" r="22" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.2"/>
  <line x1="285" y1="185" x2="315" y2="205" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="315" y1="185" x2="285" y2="205" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Alert lines -->
  <line x1="265" y1="195" x2="275" y2="195" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="325" y1="195" x2="335" y2="195" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  
  <!-- Text with more space -->
  <text x="300" y="285" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">whoops</text>
</svg>
