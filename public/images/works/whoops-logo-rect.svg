<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fef3c7"/>
  
  <!-- Terminal with header + content area -->
  <rect x="260" y="160" width="80" height="65" fill="none" stroke="#f59e0b" stroke-width="4" rx="8"/>
  <line x1="260" y1="180" x2="340" y2="180" stroke="#f59e0b" stroke-width="3"/>
  
  <!-- Terminal dots -->
  <circle cx="272" cy="170" r="3" fill="#f59e0b"/>
  <circle cx="283" cy="170" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="294" cy="170" r="3" fill="#f59e0b" opacity="0.6"/>
  
  <!-- Warning X -->
  <line x1="280" y1="195" x2="320" y2="212" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  <line x1="320" y1="195" x2="280" y2="212" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Alert icon -->
  <circle cx="300" cy="203" r="18" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>
  
  <!-- Text centered -->
  <text x="300" y="270" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">whoops</text>
</svg>
