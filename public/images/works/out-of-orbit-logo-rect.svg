<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f3e8ff"/>
  
  <!-- Circle with orbit ring centered -->
  <circle cx="300" cy="195" r="25" fill="none" stroke="#8338ec" stroke-width="4"/>
  <ellipse cx="300" cy="195" rx="45" ry="25" fill="none" stroke="#8338ec" stroke-width="3" opacity="0.6"/>
  
  <!-- Text centered -->
  <text x="300" y="270" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">Out of Orbit</text>
</svg>
