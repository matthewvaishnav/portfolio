<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f3e8ff"/>
  
  <!-- Complex planet system -->
  <circle cx="300" cy="175" r="28" fill="#8338ec"/>
  <circle cx="308" cy="167" r="7" fill="#f3e8ff" opacity="0.3"/>
  <circle cx="295" cy="180" r="5" fill="#f3e8ff" opacity="0.2"/>
  <circle cx="303" cy="185" r="3" fill="#f3e8ff" opacity="0.15"/>
  
  <!-- Multiple orbit rings -->
  <ellipse cx="300" cy="175" rx="60" ry="33" fill="none" stroke="#8338ec" stroke-width="3" opacity="0.5"/>
  <ellipse cx="300" cy="175" rx="50" ry="27" fill="none" stroke="#8338ec" stroke-width="2.5" opacity="0.35"/>
  <ellipse cx="300" cy="175" rx="40" ry="22" fill="none" stroke="#8338ec" stroke-width="2" opacity="0.25"/>
  
  <!-- Satellites + debris -->
  <circle cx="355" cy="160" r="6" fill="#8338ec"/>
  <circle cx="250" cy="195" r="5" fill="#8338ec" opacity="0.7"/>
  <circle cx="335" cy="205" r="4" fill="#8338ec" opacity="0.5"/>
  <circle cx="265" cy="155" r="3" fill="#8338ec" opacity="0.4"/>
  
  <!-- Text with more space -->
  <text x="300" y="280" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">Out of Orbit</text>
</svg>
