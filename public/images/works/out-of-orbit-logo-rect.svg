<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f3e8ff"/>
  
  <!-- Planet with rings + satellites + stars -->
  <circle cx="300" cy="195" r="25" fill="#8338ec"/>
  <circle cx="307" cy="188" r="6" fill="#f3e8ff" opacity="0.3"/>
  <circle cx="295" cy="200" r="4" fill="#f3e8ff" opacity="0.2"/>
  
  <!-- Multiple orbit rings -->
  <ellipse cx="300" cy="195" rx="55" ry="30" fill="none" stroke="#8338ec" stroke-width="3" opacity="0.5"/>
  <ellipse cx="300" cy="195" rx="45" ry="24" fill="none" stroke="#8338ec" stroke-width="2" opacity="0.3"/>
  
  <!-- Satellites -->
  <circle cx="350" cy="180" r="5" fill="#8338ec"/>
  <circle cx="255" cy="210" r="4" fill="#8338ec" opacity="0.7"/>
  <circle cx="330" cy="220" r="3" fill="#8338ec" opacity="0.5"/>
  
  <!-- Text centered -->
  <text x="300" y="270" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="middle">Out of Orbit</text>
</svg>
