<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradOrbit1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8338ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradOrbit2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06ffa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="200" cy="200" r="180" fill="#0a0a0a" stroke="url(#gradOrbit1)" stroke-width="3"/>
  
  <!-- Orbits -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#gradOrbit2)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="url(#gradOrbit2)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="url(#gradOrbit2)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5"/>
  
  <!-- Center planet -->
  <circle cx="200" cy="200" r="25" fill="url(#gradOrbit1)"/>
  
  <!-- Spaceship -->
  <g transform="translate(280, 150)">
    <polygon points="0,-15 -10,10 10,10" fill="url(#gradOrbit2)"/>
    <circle cx="0" cy="0" r="3" fill="#fff"/>
  </g>
  
  <!-- Asteroids -->
  <circle cx="150" cy="120" r="8" fill="url(#gradOrbit1)" opacity="0.6"/>
  <circle cx="280" cy="250" r="6" fill="url(#gradOrbit1)" opacity="0.6"/>
  <circle cx="120" cy="280" r="7" fill="url(#gradOrbit1)" opacity="0.6"/>
  
  <!-- Stars -->
  <circle cx="100" cy="100" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="300" cy="120" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="320" cy="280" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="80" cy="250" r="2" fill="#fff" opacity="0.8"/>
  
  <!-- Vaporwave grid -->
  <g opacity="0.2" stroke="url(#gradOrbit2)" stroke-width="1">
    <line x1="50" y1="320" x2="350" y2="320"/>
    <line x1="50" y1="340" x2="350" y2="340"/>
    <line x1="100" y1="300" x2="100" y2="360"/>
    <line x1="150" y1="300" x2="150" y2="360"/>
    <line x1="200" y1="300" x2="200" y2="360"/>
    <line x1="250" y1="300" x2="250" y2="360"/>
    <line x1="300" y1="300" x2="300" y2="360"/>
  </g>
</svg>
