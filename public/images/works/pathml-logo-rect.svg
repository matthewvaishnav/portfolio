<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" fill="none">
  <rect width="600" height="150" fill="#FFFFFF"/>
  
  <!-- Monitor/screen outline -->
  <rect x="30" y="30" width="100" height="75" stroke="#000000" stroke-width="4" fill="none" rx="2"/>
  <rect x="55" y="105" width="50" height="4" fill="#000000"/>
  <rect x="45" y="109" width="70" height="2" fill="#000000"/>
  
  <!-- Microscope icon inside monitor -->
  <g transform="translate(50, 40)">
    <!-- Eyepiece -->
    <ellipse cx="20" cy="10" rx="6" ry="4" fill="#000000"/>
    <rect x="18" y="10" width="4" height="15" fill="#000000"/>
    
    <!-- Body tube -->
    <rect x="15" y="25" width="10" height="20" fill="#000000"/>
    
    <!-- Objective lens -->
    <path d="M 17.5 45 L 15 50 L 25 50 L 22.5 45 Z" fill="#000000"/>
    
    <!-- Stage -->
    <rect x="10" y="50" width="30" height="2" fill="#000000"/>
    
    <!-- Base -->
    <rect x="7.5" y="52" width="35" height="4" fill="#000000"/>
  </g>
  
  <!-- HistoCore text -->
  <text x="160" y="75" font-family="Arial, sans-serif" font-size="32" fill="#000000" font-weight="bold">HistoCore</text>
  
  <!-- Subtitle -->
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="14" fill="#666666">Computational Pathology Framework</text>
</svg>
