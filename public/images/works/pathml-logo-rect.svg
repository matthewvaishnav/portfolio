  <rect width="600" height="400" fill="#e0f2fe"/>
  
  <!-- Complex hexagon layers with inner geometry -->
  <polygon points="300,140 340,162 340,206 300,228 260,206 260,162" 
           fill="none" stroke="#00d9f5" stroke-width="2.5" opacity="0.25"/>
  <polygon points="300,150 330,168 330,200 300,218 270,200 270,168" 
           fill="none" stroke="#00d9f5" stroke-width="3" opacity="0.4"/>
  <polygon points="300,160 320,174 320,194 300,208 280,194 280,174" 
