<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBot1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="200" cy="200" r="180" fill="#0a0a0a" stroke="url(#gradBot1)" stroke-width="3"/>
  
  <!-- Robot head -->
  <rect x="140" y="140" width="120" height="100" rx="15" fill="none" stroke="url(#gradBot1)" stroke-width="4"/>
  
  <!-- Eyes -->
  <circle cx="170" cy="180" r="15" fill="url(#gradBot1)"/>
  <circle cx="230" cy="180" r="15" fill="url(#gradBot1)"/>
  
  <!-- Antenna -->
  <line x1="200" y1="140" x2="200" y2="100" stroke="url(#gradBot1)" stroke-width="3"/>
  <circle cx="200" cy="100" r="8" fill="url(#gradBot1)"/>
  
  <!-- Mouth/interface -->
  <rect x="160" y="210" width="80" height="15" rx="5" fill="none" stroke="url(#gradBot1)" stroke-width="2"/>
  
  <!-- Browser window -->
  <rect x="100" y="260" width="200" height="80" rx="8" fill="none" stroke="url(#gradBot1)" stroke-width="3" opacity="0.6"/>
  <line x1="100" y1="280" x2="300" y2="280" stroke="url(#gradBot1)" stroke-width="2" opacity="0.6"/>
  <circle cx="115" cy="270" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="130" cy="270" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="145" cy="270" r="4" fill="#10b981" opacity="0.6"/>
  
  <!-- Local indicator -->
  <circle cx="320" cy="120" r="30" fill="none" stroke="url(#gradBot1)" stroke-width="3" opacity="0.5"/>
  <text x="305" y="130" fill="url(#gradBot1)" font-size="24" font-weight="bold">L</text>
</svg>
