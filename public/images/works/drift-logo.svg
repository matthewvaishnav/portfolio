<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradDrift1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradDrift2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="#0a0a0a" stroke="url(#gradDrift1)" stroke-width="3"/>
  
  <!-- Git-like commit graph -->
  <g stroke="url(#gradDrift2)" stroke-width="3" fill="none">
    <!-- Main branch -->
    <line x1="100" y1="100" x2="100" y2="300" opacity="0.6"/>
    <!-- Feature branch -->
    <path d="M 100 150 Q 150 150 200 180" opacity="0.6"/>
    <line x1="200" y1="180" x2="200" y2="280" opacity="0.6"/>
    <!-- Merge back -->
    <path d="M 200 280 Q 150 280 100 300" opacity="0.6"/>
    
    <!-- Timeline -->
    <line x1="100" y1="100" x2="300" y2="100" opacity="0.3"/>
    <line x1="100" y1="200" x2="300" y2="200" opacity="0.3"/>
    <line x1="100" y1="300" x2="300" y2="300" opacity="0.3"/>
  </g>
  
  <!-- Commit nodes -->
  <circle cx="100" cy="100" r="10" fill="url(#gradDrift1)"/>
  <circle cx="100" cy="150" r="10" fill="url(#gradDrift1)"/>
  <circle cx="200" cy="180" r="10" fill="url(#gradDrift2)"/>
  <circle cx="200" cy="230" r="10" fill="url(#gradDrift2)"/>
  <circle cx="200" cy="280" r="10" fill="url(#gradDrift2)"/>
  <circle cx="100" cy="200" r="10" fill="url(#gradDrift1)"/>
  <circle cx="100" cy="250" r="10" fill="url(#gradDrift1)"/>
  <circle cx="100" cy="300" r="10" fill="url(#gradDrift1)"/>
  
  <!-- Diff symbols -->
  <g opacity="0.4">
    <text x="250" y="140" fill="url(#gradDrift1)" font-size="40" font-family="monospace">+</text>
    <text x="250" y="200" fill="url(#gradDrift2)" font-size="40" font-family="monospace">~</text>
    <text x="250" y="260" fill="#ef4444" font-size="40" font-family="monospace">-</text>
  </g>
  
  <!-- Server state layers -->
  <g opacity="0.3" stroke="url(#gradDrift1)" stroke-width="2" fill="none">
    <rect x="280" y="120" width="60" height="15" rx="3"/>
    <rect x="280" y="180" width="60" height="15" rx="3"/>
    <rect x="280" y="240" width="60" height="15" rx="3"/>
  </g>
</svg>
